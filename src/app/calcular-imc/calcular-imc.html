<div class="page-shell">
  <div class="background-blur blur-one"></div>
  <div class="background-blur blur-two"></div>

  <section class="calculator-card">
    <div class="header">
      <span class="badge">Saúde e Bem-estar</span>
      <h1>Calculadora de IMC</h1>
      <p>Informe o peso e a altura para calcular o índice de massa corporal e visualizar a classificação.</p>
    </div>

    <div class="form-grid">
      <div class="input-group">
        <label for="peso">Peso (kg)</label>
        <input id="peso" type="number" [(ngModel)]="peso" placeholder="Digite o peso em kg" />
      </div>

      <div class="input-group">
        <label for="altura">Altura (m)</label>
        <input id="altura" type="number" step="0.01" [(ngModel)]="altura" placeholder="Digite a altura em metros" />
      </div>
    </div>

    <div class="button-row">
      <button type="button" (click)="calcularImc()">Calcular</button>
      <button type="button" class="ghost-btn" (click)="limpar()">Limpar</button>
    </div>

    <div class="result-box" *ngIf="imc !== null">
      <div class="result-item">
        <span class="result-label">IMC</span>
        <span class="result-value">{{ imc }}</span>
      </div>
      <div class="result-item">
        <span class="result-label">Classificação</span>
        <span class="classification">{{ classificacao }}</span>
      </div>
    </div>
  </section>
</div>
